  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.EditorialCmsSite && typeof window.EditorialCmsSite.renderFooterContent === 'function') {
        window.EditorialCmsSite.renderFooterContent(document);
      }
    });
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var hasRecordedView = false;

      function recordColumnView(columnId) {
        if (!columnId) return;

        fetch('/.netlify/functions/column-views', {
          method: 'POST',
          cache: 'no-store',
          keepalive: true,
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ id: columnId })
        })
          .then(function(response) {
            if (!response.ok) {
              throw new Error('Unable to record view');
            }
            return response.json();
          })
          .then(function(payload) {
            if (!payload || typeof payload.count !== 'number') return;
            col.vistas = payload.count;
            var viewsNode = document.getElementById('col-views');
            if (viewsNode) {
              viewsNode.textContent = formatViews(payload.count);
            }
          })
          .catch(function() {
            try {
              if (navigator.sendBeacon) {
                var beaconBody = new Blob([JSON.stringify({ id: columnId })], { type: 'application/json' });
                navigator.sendBeacon('/.netlify/functions/column-views', beaconBody);
              }
            } catch (error) {}

            var fallbackCount = parseInt(col && col.vistas, 10);
            fallbackCount = isFinite(fallbackCount) && fallbackCount > 0 ? fallbackCount + 1 : 1;
            col.vistas = fallbackCount;
            var fallbackViewsNode = document.getElementById('col-views');
            if (fallbackViewsNode) {
              fallbackViewsNode.textContent = formatViews(fallbackCount);
            }
          });
      }

      function recordCurrentColumnView() {
        if (!col || !col.id || hasRecordedView) return;
        hasRecordedView = true;
        recordColumnView(col.id);
      }

      function formatViews(count) {
        var value = parseInt(count, 10);
        var total = isFinite(value) && value > 0 ? value : 0;
        return total + ' vista' + (total === 1 ? '' : 's');
      }

      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, function (char) {
          var map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
          };
          return map[char] || char;
        });
      }

      var params = new URLSearchParams(window.location.search);
      var colId = params.get('id');
      var col = colId ? COLUMNAS.find(function(c) { return c.id === colId; }) : null;
      if (!col) col = COLUMNAS[0];

      // TÃ­tulo de la pÃ¡gina
      document.title = col.titulo + ' â€” EstaciÃ³n Rural';

      // Portada editorial
      document.getElementById('col-title').textContent = col.titulo;
      document.getElementById('col-summary').textContent = col.resumen || '';
      var authorUrl = '';
      if (window.EditorialCmsSite && typeof window.EditorialCmsSite.getColumnistaPageUrl === 'function') {
        authorUrl = window.EditorialCmsSite.getColumnistaPageUrl({
          id: col.autorId || '',
          name: col.autor || ''
        });
      } else if (col.autorId || col.autor) {
        authorUrl = 'columnista.html?id=' + encodeURIComponent(col.autorId || (window.EditorialCmsSite ? window.EditorialCmsSite.slugify(col.autor) : col.autor || ''));
      }

      var authorLabel = col.autor || 'Autor/a';
      var authorMarkup = authorUrl && authorUrl.indexOf('id=') !== -1
        ? '<a href="' + authorUrl + '" class="columnista-link column-author-link">' + escapeHtml(authorLabel) + '</a>'
        : '<span>' + escapeHtml(authorLabel) + '</span>';

      document.getElementById('col-meta').innerHTML =
        'Por ' + authorMarkup + ' <span class="sep">/</span> ' + col.fecha + ' <span class="sep">/</span> <span id="col-views" class="column-view-count">' + formatViews(col.vistas || 0) + '</span>';

      var bannerImage = document.getElementById('col-banner-image');
      if (bannerImage) {
        bannerImage.src = col.imagen || col.banner || 'images/col01_img.jpg';
        bannerImage.alt = col.titulo || 'Banner de la columna';
      }

      var hashtagsNode = document.getElementById('col-hashtags');
      if (hashtagsNode) {
        var hashtags = Array.isArray(col.hashtags) ? col.hashtags : [];
        hashtagsNode.textContent = '';
        hashtags.forEach(function(tag) {
          var chip = document.createElement('span');
          chip.className = 'column-article-hero__hashtag';
          chip.textContent = tag;
          hashtagsNode.appendChild(chip);
        });
        hashtagsNode.style.display = hashtags.length ? '' : 'none';
      }

      // Contenido de la columna
      var contentHtml = '';
      if (window.EditorialCmsSite && typeof window.EditorialCmsSite.columnContentToHtml === 'function') {
        contentHtml = window.EditorialCmsSite.columnContentToHtml(col.contenidoHtml || col.contenido);
      } else if (Array.isArray(col.contenido)) {
        contentHtml = col.contenido.map(function (parrafo) {
          return '<p>' + escapeHtml(parrafo) + '</p>';
        }).join('');
      } else {
        contentHtml = '<p>' + escapeHtml(String(col.contenido || '')).replace(/\n/g, '<br>') + '</p>';
      }
      document.getElementById('col-contenido').innerHTML = contentHtml || '<p></p>';

      if (window.EditorialContentInteractions) {
        window.EditorialContentInteractions.mountEngagement({
          mountId: 'col-engagement',
          type: 'column',
          id: col.id,
          title: 'Comparte y comenta esta columna',
          description: 'Abre la conversación sobre este texto y difúndelo en tus redes.',
          kicker: 'Columna',
          shareText: 'Lee esta columna de El Deslinde:',
          shareUrl: window.location.href.split('#')[0],
          previewUrl: window.location.origin + '/.netlify/functions/share-column?id=' + encodeURIComponent(col.id)
        });
      }

      if (col && col.id) {
        recordCurrentColumnView();
        window.addEventListener('pageshow', function(event) {
          if (event && event.persisted) {
            hasRecordedView = false;
          }
          recordCurrentColumnView();
        });
      }

    });
  </script>
